sonar.projectKey=Cap-go_website
sonar.organization=cap-go
sonar.sources=.

# Static docs/blog content is intentionally generated and verbose.
# Keep it out of code-quality and duplication gates for this repo split.
sonar.exclusions=\
  apps/docs/src/content/**,\
  apps/web/src/content/**,\
  docs/**,\
  loadedVectorStore/**,\
  node_modules/**,\
  apps/**/dist/**,\
  apps/**/.astro/**,\
  README.md

sonar.cpd.exclusions=\
  apps/docs/astro.config.mjs,\
  apps/web/astro.config.mjs,\
  apps/docs/src/content/**,\
  apps/web/src/content/**,\
  docs/**,\
  README.md
