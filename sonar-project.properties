sonar.projectKey=Cap-go_website
sonar.organization=cap-go
sonar.sources=.

# Static docs/blog content and translation catalogs are intentionally duplicated across locales.
# Keep them out of code-quality and duplication gates for this repo split.
sonar.exclusions=\
  apps/docs/src/content/**,\
  apps/web/src/content/**,\
  docs/**,\
  loadedVectorStore/**,\
  messages/**,\
  node_modules/**,\
  apps/**/dist/**,\
  apps/**/.astro/**,\
  README.md

sonar.cpd.exclusions=\
  apps/docs/astro.config.mjs,\
  apps/web/astro.config.mjs,\
  apps/docs/src/content/**,\
  apps/web/src/content/**,\
  docs/**,\
  messages/**,\
  README.md
