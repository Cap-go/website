[files]
extend-exclude = [
    "public/**/*_tye.png",
    "apps/web/public/**/*_tye.png",
    "apps/docs/public/**/*_tye.png",
    ".github/assets/readme-banner-preview.png",
    "loadedVectorStore/**",
    "src/pages/**",
    "apps/web/src/pages/**",
    "src/services/supabase.types.ts",
    "src/components/**",
    "apps/web/src/components/**",
    "apps/docs/src/components/**",
    "public/",
    "apps/web/public/",
    "apps/docs/public/",
]

[default]
extend-ignore-re = [
    # Ignore URLs
    "https?://\\S+",
]

[default.extend-words]
# These are proper names, not typos
Longe = "Longe"
Damon = "Damon"

# Acronyms and technical terms
ASO = "ASO"  # App Store Optimization
ITMS = "ITMS"  # iTunes Music Store
Hashi = "Hashi"  # HashiCorp (brand name)
formatable = "formatable"  # NFC event literal from upstream API

# Translation keys/identifiers - these should remain as-is
udid = "udid"  # iOS device UDID (technical term)
UDID = "UDID"  # iOS device UDID (technical term)
RTO = "RTO"  # Recovery Time Objective
Sanbox = "Sanbox"  # Legacy copy key kept for runtime compatibility
framworks = "framworks"  # Legacy copy key kept for runtime compatibility
youre = "youre"  # Legacy copy key kept for runtime compatibility

# OpenSSL command flags
passin = "passin"  # OpenSSL password input flag

[default.extend-identifiers]
# Acronym plurals typos otherwise splits and misflags (e.g. "PNGs" -> "PN" -> "ON")
PNGs = "PNGs"
