name: Deploy

concurrency:
  group: deploy-production
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      target:
        description: Worker to deploy
        required: true
        type: choice
        options:
          - docs
          - web
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  resolve-target:
    name: Resolve deploy target
    runs-on: ubuntu-latest
    outputs:
      deploy_target: ${{ steps.resolve.outputs.deploy_target }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'apps/docs/**'
            web:
              - 'apps/web/**'
            shared:
              - 'apps/shared/**'
              - 'messages/**'
              - 'project.inlang/**'
              - 'scripts/**'
              - 'configs.json'
              - 'package.json'
              - 'bun.lock'
      - name: Resolve deploy target
        id: resolve
        shell: bash
        run: |
          event_name='${{ github.event_name }}'
          manual_target='${{ github.event.inputs.target || '' }}'
          docs_changed='${{ steps.changes.outputs.docs }}'
          web_changed='${{ steps.changes.outputs.web }}'
          shared_changed='${{ steps.changes.outputs.shared }}'

          if [[ "$event_name" == "workflow_dispatch" ]]; then
            echo "deploy_target=$manual_target" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$shared_changed" == "true" ]]; then
            echo "::error::Shared files changed. Split the release so only docs or web is deployed."
            exit 1
          fi

          if [[ "$docs_changed" == "true" && "$web_changed" == "true" ]]; then
            echo "::error::Docs and web changed in the same push. Split the release so only one worker is deployed."
            exit 1
          fi

          if [[ "$docs_changed" == "true" ]]; then
            echo "deploy_target=docs" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$web_changed" == "true" ]]; then
            echo "deploy_target=web" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deploy_target=none" >> "$GITHUB_OUTPUT"
          echo "No deployable docs or web changes detected. Skipping deployment."

  typos:
    name: Check for Typos
    needs: resolve-target
    if: needs.resolve-target.outputs.deploy_target != 'none'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Check for Typos
        uses: crate-ci/typos@v1.44.0

  build:
    # Use a larger runner for faster builds
    # ubuntu-latest-8-cores: 8 cores, 32GB RAM (requires GitHub Team/Enterprise or pay-per-use)
    # ubuntu-latest: 4 cores, 16GB RAM (free tier)
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - typos
    if: needs.resolve-target.outputs.deploy_target != 'none'
    timeout-minutes: 30
    env:
      # Increase Node.js memory and I/O thread pool for faster builds
      NODE_OPTIONS: '--max-old-space-size=16384'
      UV_THREADPOOL_SIZE: '32'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache bun dependencies
      - name: Cache bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Cache Astro build artifacts
      - name: Cache Astro build
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.astro
            apps/docs/.astro
            node_modules/.astro
            node_modules/.cache
          key: ${{ runner.os }}-astro-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('apps/web/**', 'apps/docs/**', 'messages/**', 'project.inlang/**', 'scripts/**', 'configs.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-${{ hashFiles('**/bun.lock') }}-
            ${{ runner.os }}-astro-

      - run: bun install --frozen-lockfile
      - name: Check docs
        if: needs.resolve-target.outputs.deploy_target == 'docs'
        run: cd apps/docs && bun run check
      - name: Check workspace for web deploy
        if: needs.resolve-target.outputs.deploy_target == 'web'
        run: bun run check
      - run: bun run build:prepare
      - name: Build docs
        if: needs.resolve-target.outputs.deploy_target == 'docs'
        run: bun run build:docs
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ORAMA_CLOUD_API_KEY: ${{ secrets.ORAMA_CLOUD_API_KEY }}
          ORAMA_CLOUD_ENDPOINT: ${{ secrets.ORAMA_CLOUD_ENDPOINT }}
          CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SITE_KEY }}
      - name: Build workspace for web deploy
        if: needs.resolve-target.outputs.deploy_target == 'web'
        run: bun run build
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ORAMA_CLOUD_API_KEY: ${{ secrets.ORAMA_CLOUD_API_KEY }}
          ORAMA_CLOUD_ENDPOINT: ${{ secrets.ORAMA_CLOUD_ENDPOINT }}
          CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SITE_KEY }}
      - name: Finalize web build artifacts
        if: needs.resolve-target.outputs.deploy_target == 'web'
        run: bun run build:after
      - name: Deploy docs worker
        if: needs.resolve-target.outputs.deploy_target == 'docs'
        run: bun run deploy:docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy web worker
        if: needs.resolve-target.outputs.deploy_target == 'web'
        run: bun run deploy:web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
