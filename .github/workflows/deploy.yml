name: Deploy

# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  typos:
    name: Check for Typos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Check for Typos
        uses: crate-ci/typos@v1.44.0

  build:
    # Use a larger runner for faster builds
    # ubuntu-latest-8-cores: 8 cores, 32GB RAM (requires GitHub Team/Enterprise or pay-per-use)
    # ubuntu-latest: 4 cores, 16GB RAM (free tier)
    runs-on: ubuntu-latest
    needs: typos
    timeout-minutes: 30
    env:
      # Increase Node.js memory and I/O thread pool for faster builds
      NODE_OPTIONS: '--max-old-space-size=16384'
      UV_THREADPOOL_SIZE: '32'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache bun dependencies
      - name: Cache bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Cache Astro build artifacts
      - name: Cache Astro build
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.astro
            apps/docs/.astro
            node_modules/.astro
            node_modules/.cache
          key: ${{ runner.os }}-astro-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('apps/web/**', 'apps/docs/**', 'messages/**', 'project.inlang/**', 'scripts/**', 'configs.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-${{ hashFiles('**/bun.lock') }}-
            ${{ runner.os }}-astro-

      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build:prepare
      - run: bun run build
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ORAMA_CLOUD_API_KEY: ${{ secrets.ORAMA_CLOUD_API_KEY }}
          ORAMA_CLOUD_ENDPOINT: ${{ secrets.ORAMA_CLOUD_ENDPOINT }}
          CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SITE_KEY }}
      - run: bun run build:after
      - run: bun run deploy:docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: bun run deploy:web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
