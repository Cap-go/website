name: Deploy Web

concurrency:
  group: deploy-production
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/shared/**'
      - 'messages/**'
      - 'project.inlang/**'
      - 'scripts/**'
      - 'configs.json'
      - 'package.json'
      - 'bun.lock'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  typos:
    name: Check for Typos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Check for Typos
        # v1.44.0
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d

  build:
    runs-on: ubuntu-latest
    needs: typos
    timeout-minutes: 30
    steps:
      # actions/checkout v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # v2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Cache bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Astro build
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.astro
            node_modules/.astro
            node_modules/.cache
          key: ${{ runner.os }}-astro-web-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('apps/web/**', 'apps/shared/**', 'messages/**', 'project.inlang/**', 'scripts/**', 'configs.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-web-${{ hashFiles('**/bun.lock') }}-
            ${{ runner.os }}-astro-web-

      - run: bun install --frozen-lockfile
      - run: cd apps/web && bun run check
      - run: bun run build:prepare:web
      - run: bun run clean:build-cache
      - run: bun run build:web
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ORAMA_CLOUD_API_KEY: ${{ secrets.ORAMA_CLOUD_API_KEY }}
          ORAMA_CLOUD_ENDPOINT: ${{ secrets.ORAMA_CLOUD_ENDPOINT }}
          CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SITE_KEY }}
      - run: bun run build:after
      - run: bun run deploy:web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
