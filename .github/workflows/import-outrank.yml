name: Import Outrank Articles

on:
  repository_dispatch:
    types:
      - outrank_publish_articles
  workflow_dispatch:
    inputs:
      payload:
        description: Raw Outrank publish_articles payload JSON for testing.
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: outrank-import-${{ github.event.client_payload.timestamp || github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--max-old-space-size=16384'
  UV_THREADPOOL_SIZE: '32'

jobs:
  import:
    name: Import articles
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Cache bun modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Write manual payload
        if: github.event_name == 'workflow_dispatch'
        env:
          OUTRANK_MANUAL_PAYLOAD: ${{ inputs.payload }}
        run: printf '%s' "$OUTRANK_MANUAL_PAYLOAD" > "$RUNNER_TEMP/outrank-payload.json"

      - name: Import Outrank articles
        id: import
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            bun run scripts/blogs/import_outrank.ts "$RUNNER_TEMP/outrank-payload.json"
          else
            bun run scripts/blogs/import_outrank.ts
          fi

      - name: Format imported articles
        if: steps.import.outputs.files != ''
        run: xargs bunx prettier --write < .outrank-imported-files

      - name: Verify website
        if: steps.import.outputs.files != ''
        run: bun run ci:verify:web
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ORAMA_CLOUD_API_KEY: ${{ secrets.ORAMA_CLOUD_API_KEY }}
          ORAMA_CLOUD_ENDPOINT: ${{ secrets.ORAMA_CLOUD_ENDPOINT }}
          CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SITE_KEY }}

      - name: Push imported articles to main
        if: steps.import.outputs.files != ''
        shell: bash
        run: |
          rm -f .outrank-imported-files

          if [[ -z "$(git status --porcelain apps/web/src/content/blog/en)" ]]; then
            echo "No blog changes to publish."
            exit 0
          fi

          default_branch="${{ github.event.repository.default_branch }}"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add apps/web/src/content/blog/en
          git commit -m "chore: import Outrank articles"
          git pull --rebase origin "$default_branch"
          git push origin "HEAD:$default_branch"
